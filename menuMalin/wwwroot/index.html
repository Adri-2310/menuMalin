<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>menuMalin</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="menuMalin.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Une erreur non gérée s'est produite.
        <a href="." class="reload">Recharger</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Désactiver SRI en développement pour éviter les erreurs de hash intégrité -->
    <script>
        window.Blazor = window.Blazor || {};
        window.Blazor._internal = window.Blazor._internal || {};
        window.Blazor._internal.downloadResource = (async function(originalDownload) {
            return async function(url, initRequest) {
                try {
                    return await originalDownload(url, initRequest);
                } catch (e) {
                    if (e.message && e.message.includes('integrity')) {
                        console.warn('SRI integrity check failed, retrying without SRI:', url);
                        initRequest.integrity = '';
                        return await fetch(url, initRequest);
                    }
                    throw e;
                }
            };
        }(window.Blazor._internal.downloadResource || fetch));
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
