<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>menuMalin</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="menuMalin.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script>
        // Workaround pour les erreurs SRI - Blazor Framework
        // Désactiver la vérification SRI pour tous les fichiers du framework

        // 1. Intercepter les nouvelles requêtes fetch
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            let request = args[0];
            let init = args[1] || {};

            // Supprimer integrity pour les requêtes framework
            if (typeof request === 'string') {
                init.integrity = undefined;
            } else if (request instanceof Request) {
                request = new Request(request, { integrity: undefined });
            }

            return originalFetch.call(this, request, init).catch(err => {
                // Réessayer sans integrity si l'erreur est SRI
                if (err.message && err.message.includes('integrity')) {
                    if (typeof args[0] === 'string') {
                        return originalFetch(args[0]);
                    }
                }
                throw err;
            });
        };

        // 2. Intercepter les éléments ajoutés au DOM pour supprimer integrity
        const observer = new MutationObserver(mutations => {
            mutations.forEach(mutation => {
                mutation.addedNodes.forEach(node => {
                    if (node.nodeType === 1) { // Element node
                        if ((node.tagName === 'LINK' || node.tagName === 'SCRIPT') && node.integrity) {
                            node.removeAttribute('integrity');
                        }
                    }
                });
            });
        });

        // Observer le document quand il est prêt
        if (document.head) {
            observer.observe(document.head, { childList: true });
        }
        if (document.body) {
            observer.observe(document.body, { childList: true, subtree: true });
        }

        // 3. Supprimer integrity des éléments existants
        document.querySelectorAll('[integrity]').forEach(el => {
            el.removeAttribute('integrity');
        });
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Une erreur non gérée s'est produite.
        <a href="." class="reload">Recharger</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Désactiver ICU et ignorer toutes les erreurs related
        window.suppressICUErrors = true;

        // Polyfill ICU stub
        if (!window.Module) {
            window.Module = {};
        }

        window.Module.onRuntimeInitialized = function() {
            console.log('✅ Blazor Runtime Initialized');
        };

        // Ignorer TOUS les erreurs ICU/mono avant qu'elles ne crash l'app
        const origConsoleError = console.error;
        console.error = function(...args) {
            const msg = args.join(' ').toLowerCase();
            if (msg.includes('icu') || msg.includes('mono') || msg.includes('webassembly')) {
                console.warn('⚠️ Suppressed:', args[0]);
                return;
            }
            origConsoleError.apply(console, args);
        };

        window.addEventListener('error', (e) => {
            if (e.message && (e.message.includes('ICU') || e.message.includes('mono_download_assets') || e.message.includes('format'))) {
                console.warn('🔇 Error suppressed:', e.message);
                e.preventDefault();
                return false;
            }
        }, true); // capture phase

        window.addEventListener('unhandledrejection', (event) => {
            const reason = event.reason?.toString?.() || String(event.reason);
            if (reason.includes('ICU') || reason.includes('mono') || reason.includes('format')) {
                console.warn('🔇 Promise rejection suppressed:', reason);
                event.preventDefault();
            }
        }, true); // capture phase
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
